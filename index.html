<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>京都バス退職金試算システム 2026版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root" class="flex items-center justify-center min-h-screen text-slate-400 font-bold">
        Loading System...
    </div>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-log').textContent += e.message + '\n' + (e.error && e.error.stack ? e.error.stack : '') + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-log').textContent += 'Unhandled Promise Rejection: ' + e.reason + '\n\n';
      });
    </script>
    <!-- Vite entry point -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
